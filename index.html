<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width"/>
  <title>To Do List</title>
  <link rel="stylesheet" href="styles.css"/>
  <script src="script.js" type="module"></script>
</head>
<body>
  <div class="todo" id="todo">
    <h1 class="todo_title">To-Do List</h1>
    <form class="todo_form" id="newTaskForm">
      <div class="todo_field field">
        <label class="field_label" for="newTaskInput">New task</label>
        <input class="field_input" id="newTaskInput"
          placeholder="New task title"
          autocomplete="on"
        />
      </div>
      <button class="button" type="submit">Add</button>
    </form>
<form class="todo_form" id="searchTaskForm">
  <div class="todo_field field">

    <label class="field_label" for="searchInput">Search task</label>

    <input
      class="field_input field_input--search"
      id="searchInput"
      placeholder=" "
      autocomplete="off"
      type="search"
    />
    <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M14 14L11.1 11.1M12.6667 7.33333C12.6667 10.2789 10.2789 12.6667 7.33333 12.6667C4.38781 12.6667 2 10.2789 2 7.33333C2 4.38781 4.38781 2 7.33333 2C10.2789 2 12.6667 4.38781 12.6667 7.33333Z"
        stroke="#1E1E1E" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>

  </div>
</form>
    <div class="todo_info">
      <div class="todo_total-tasks">
        Total tasks: <span id="totalTasks">0</span>
      </div>
      <button class="todo_delete-all-btn" type="button" id="deleteAllBtn">
        Delete all
      </button>
    </div>
    <ul class="todo_list" id="taskList"></ul>
    <div class="todo_empty-message" id="emptyMessage"></div>
  </div>
</body>
</html>
